<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoonAi Pro Plattform</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src http://localhost:3000 https:;">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden antialiased">

    <!-- Auth Maske -->
    <div id="auth-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-gray-800 p-8 rounded-2xl w-full max-w-md border border-gray-750 shadow-2xl">
            <div class="text-center mb-8">
                <i class="fa-solid fa-moon text-5xl text-blue-500 mb-2"></i>
                <h1 class="text-2xl font-bold tracking-wide">Willkommen bei MoonAi</h1>
                <p class="text-gray-400 text-sm mt-1">Registriere dich oder logge dich ein</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">E-Mail Adresse</label>
                    <input type="email" id="email" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">Passwort</label>
                    <input type="password" id="password" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div id="auth-error" class="text-red-400 text-xs hidden font-medium"></div>
                <div class="flex gap-3 pt-2">
                    <button onclick="login()" class="flex-1 bg-blue-600 hover:bg-blue-500 p-3 rounded-xl font-medium transition shadow-md">Login</button>
                    <button onclick="register()" class="flex-1 bg-gray-700 hover:bg-gray-600 p-3 rounded-xl font-medium transition">Registrieren</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Chat Workspace -->
    <div id="app" class="hidden flex h-full w-full">
        <!-- Linksseitige Verlaufshistorie -->
        <aside id="sidebar" class="w-64 bg-gray-950 flex-shrink-0 border-r border-gray-800 hidden md:flex flex-col">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center">
                <span class="font-bold text-md tracking-wide text-blue-400"><i class="fa-solid fa-bolt mr-1"></i> MoonAi Workspace</span>
            </div>
            <div class="p-3">
                <button onclick="startNewChat()" class="w-full text-center p-2.5 bg-blue-600 hover:bg-blue-500 rounded-xl text-sm font-medium transition shadow-md">
                    <i class="fa-solid fa-plus mr-2"></i> Neuer Chat
                </button>
            </div>
            <div class="p-3 flex-1 overflow-y-auto space-y-1.5" id="chat-history"></div>
            <div class="p-4 border-t border-gray-800 flex justify-between items-center">
                <span class="text-xs text-gray-500">v1.2 Secure</span>
                <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-400 transition font-medium">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-1"></i> Abmelden
                </button>
            </div>
        </aside>

        <!-- Chat Workspace Area -->
        <main class="flex-1 flex flex-col relative h-full bg-gray-900">
            <!-- Navbar Header -->
            <header class="p-4 flex items-center justify-between border-b border-gray-800 bg-gray-900/50 backdrop-blur-md">
                <button onclick="toggleSidebar()" class="text-xl md:hidden text-gray-400 hover:text-white" aria-label="Menü">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="flex items-center gap-2">
                    <span class="text-xs uppercase tracking-widest text-gray-400 font-bold hidden sm:inline">Engine:</span>
                    <select id="model-select" class="bg-gray-800 text-white rounded-xl px-3 py-1.5 text-xs border border-gray-700 outline-none focus:ring-2 focus:ring-blue-500 font-medium cursor-pointer">
                        <option value="auto">🤖 Intelligentes Auto-Routing</option>
                        <option value="gemini">✨ Google Gemini 2.5 Flash</option>
                        <option value="openai">🧠 OpenAI GPT-4o Pro</option>
                        <option value="mistral">🇪🇺 Mistral Large Engine</option>
                    </select>
                </div>
            </header>

            <!-- Chat Window -->
            <div id="chat-window" class="flex-1 overflow-y-auto p-4 pb-28 relative">
                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-700 pointer-events-none">
                    <i class="fa-solid fa-cloud-moon text-6xl mb-3 opacity-40"></i>
                    <p class="text-sm opacity-50 tracking-wide font-medium">Starte eine neue Konversation...</p>
                </div>
                <div id="messages-container" class="space-y-6 max-w-3xl mx-auto"></div>
            </div>

            <!-- Input Steuerleiste -->
            <div class="absolute bottom-0 w-full p-4 bg-gradient-to-t from-gray-900 via-gray-900 to-transparent">
                <div class="max-w-3xl mx-auto relative flex items-end bg-gray-800 rounded-2xl p-2 border border-gray-750 shadow-xl">
                    <label for="file-upload" class="p-3 text-gray-400 hover:text-white cursor-pointer transition">
                        <i class="fa-solid fa-paperclip"></i>
                    </label>
                    <input type="file" id="file-upload" class="hidden" accept="image/*, video/*">

                    <textarea id="chat-input" rows="1" placeholder="Frage MoonAi etwas..." class="flex-1 bg-transparent resize-none outline-none p-3 max-h-32 text-sm text-gray-100" oninput="autoGrow(this)"></textarea>

                    <button onclick="sendMessage()" class="p-3 text-white bg-blue-600 rounded-xl hover:bg-blue-500 transition ml-2 shadow-md">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <div id="file-preview" class="max-w-3xl mx-auto mt-2 text-xs text-blue-400 font-medium hidden px-2"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
