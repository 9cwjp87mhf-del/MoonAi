<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonAi</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="new-chat" class="new-chat-btn">
                    <i class="fas fa-plus"></i> Neuer Chat
                </button>
            </div>
            <div class="chat-history" id="chat-history"></div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <span id="username-display">MoonAi User</span>
                    <button id="logout-btn">Abmelden</button>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main">
            <header class="chat-header">
                <button id="toggle-sidebar" class="icon-btn"><i class="fas fa-bars"></i></button>
                <h1>MoonAi</h1>
                <div class="header-actions">
                    <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                </div>
            </header>

            <!-- Login Screen -->
            <div id="login-screen" class="auth-screen">
                <div class="auth-form">
                    <h2>Willkommen bei MoonAi</h2>
                    <input type="email" id="login-email" placeholder="E-Mail" required>
                    <input type="password" id="login-password" placeholder="Passwort" required>
                    <button id="login-btn">Anmelden</button>
                    <p>Kein Account? <a href="#" id="show-register">Registrieren</a></p>
                </div>
            </div>

            <!-- Register Screen -->
            <div id="register-screen" class="auth-screen hidden">
                <div class="auth-form">
                    <h2>Account erstellen</h2>
                    <input type="text" id="reg-username" placeholder="Benutzername" required>
                    <input type="email" id="reg-email" placeholder="E-Mail" required>
                    <input type="password" id="reg-password" placeholder="Passwort" required>
                    <button id="register-btn">Registrieren</button>
                    <p>Bereits registriert? <a href="#" id="show-login">Anmelden</a></p>
                </div>
            </div>

            <!-- Chat Interface -->
            <div id="chat-interface" class="chat-interface hidden">
                <div id="messages" class="messages"></div>
                
                <div class="input-area">
                    <div class="image-preview" id="image-preview" style="display: none;">
                        <img id="preview-img" src="" alt="Vorschau">
                        <button id="remove-image" class="remove-btn">×</button>
                    </div>
                    <div class="input-wrapper">
                        <button id="upload-btn" class="icon-btn"><i class="fas fa-paperclip"></i></button>
                        <input type="file" id="image-upload" accept="image/png, image/jpeg, image/webp" hidden>
                        <input type="text" id="message-input" placeholder="Nachricht an MoonAi..." autocomplete="off">
                        <button id="send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div class="disclaimer">MoonAi kann Fehler machen. Überprüfe wichtige Infos.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
