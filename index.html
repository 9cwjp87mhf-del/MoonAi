<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoonAi</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#212121" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MoonAi" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Marked.js für Markdown-Rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <!-- highlight.js für Code-Highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<!-- ══════════════════════ AUTH OVERLAY ══════════════════════ -->
<div id="auth-overlay" class="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 36 36" fill="none" class="moon-icon"><circle cx="18" cy="18" r="18" fill="#1a1a2e"/><path d="M26 18.5a9 9 0 01-11.5 8.6A9 9 0 0118 9a9 9 0 018 9.5z" fill="#7c6af7"/><circle cx="22" cy="13" r="2" fill="#a89cf5" opacity="0.6"/></svg>
      <span>MoonAi</span>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Anmelden</button>
      <button class="auth-tab" data-tab="register">Registrieren</button>
    </div>

    <!-- Login Form -->
    <div id="tab-login" class="auth-form active">
      <div class="form-group">
        <label for="login-identifier">Benutzername oder E-Mail</label>
        <input type="text" id="login-identifier" placeholder="name@beispiel.de" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="login-password">Passwort</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div id="login-error" class="auth-error hidden"></div>
      <button id="login-btn" class="auth-submit-btn">Anmelden</button>
    </div>

    <!-- Register Form -->
    <div id="tab-register" class="auth-form">
      <div class="form-group">
        <label for="reg-username">Benutzername</label>
        <input type="text" id="reg-username" placeholder="dein_name" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="reg-email">E-Mail</label>
        <input type="email" id="reg-email" placeholder="name@beispiel.de" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="reg-password">Passwort (min. 8 Zeichen)</label>
        <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <div id="reg-error" class="auth-error hidden"></div>
      <div id="reg-success" class="auth-success hidden"></div>
      <button id="register-btn" class="auth-submit-btn">Konto erstellen</button>
    </div>
  </div>
</div>

<!-- ══════════════════════ APP SHELL ══════════════════════════ -->
<div id="app" class="app hidden">

  <!-- ── Sidebar ───────────────────────────────────────── -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-top">
      <button id="new-chat-btn" class="new-chat-btn" title="Neuer Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Neuer Chat
      </button>
    </div>

    <nav id="chat-list" class="chat-list">
      <!-- Chats werden dynamisch eingefügt -->
    </nav>

    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-name-display">–</span>
      </div>
      <button id="logout-btn" class="logout-btn" title="Abmelden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <!-- ── Toggle Sidebar Button ─────────────────────────── -->
  <button id="sidebar-toggle" class="sidebar-toggle" title="Sidebar ein-/ausblenden">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>

  <!-- ── Main Content ───────────────────────────────────── -->
  <main id="main" class="main">

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <div class="empty-logo">
        <svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="30" fill="#1a1a2e"/><path d="M43 31a14 14 0 01-18 13.3A14 14 0 0130 17a14 14 0 0113 14z" fill="#7c6af7"/><circle cx="37" cy="24" r="3" fill="#a89cf5" opacity="0.7"/></svg>
      </div>
      <h1>Womit kann ich dir helfen?</h1>
      <p>Stelle eine Frage, lade ein Bild hoch oder starte ein Gespräch.</p>
    </div>

    <!-- Messages Container -->
    <div id="messages" class="messages hidden"></div>

    <!-- Input Area -->
    <div class="input-area">
      <!-- Bild-Vorschau -->
      <div id="image-preview-container" class="image-preview-container hidden">
        <div class="image-preview-wrapper">
          <img id="image-preview" src="" alt="Vorschau" />
          <button id="remove-image-btn" class="remove-image-btn" title="Bild entfernen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>

      <div class="input-box">
        <!-- Datei-Upload Button -->
        <button id="upload-btn" class="input-icon-btn" title="Bild hochladen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </button>
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/gif,image/webp" class="hidden" />

        <!-- Textarea -->
        <textarea
          id="message-input"
          placeholder="Nachricht an MoonAi …"
          rows="1"
          maxlength="8000"
          autocomplete="off"
        ></textarea>

        <!-- Send Button -->
        <button id="send-btn" class="send-btn" disabled title="Senden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
      <p class="input-disclaimer">MoonAi kann Fehler machen. Überprüfe wichtige Informationen.</p>
    </div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
